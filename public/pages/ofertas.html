<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofertas laborales — Workify</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar" id="main-nav">
  <a href="/" class="navbar-brand">Workify<span class="brand-dot"></span></a>
  <div class="navbar-nav">
    <a href="/pages/index.html" class="nav-link"><i class="fa-solid fa-house fa-sm"></i> Inicio</a>
    <a href="/pages/ofertas.html" class="nav-link active"><i class="fa-solid fa-briefcase fa-sm"></i> Ofertas</a>
    <a href="/pages/servicios.html" class="nav-link"><i class="fa-solid fa-wrench fa-sm"></i> Servicios</a>
  </div>
  <div class="navbar-actions">
    <button class="notif-btn" id="nav-notif-btn" onclick="openNotificaciones()" style="display:none">
      <i class="fa-regular fa-bell"></i>
      <span class="notif-badge" id="notif-count" style="display:none">0</span>
    </button>
    <a href="/pages/publicar.html" class="btn btn-teal btn-sm" id="nav-publicar-btn" style="display:none">
      <i class="fa-solid fa-plus"></i> Publicar
    </a>
    <a href="/pages/perfil.html" class="btn btn-outline btn-sm" id="nav-perfil-btn"
       style="display:none;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:white">
      <i class="fa-solid fa-user"></i> Mi perfil
    </a>
    <a href="/pages/admin.html" class="btn btn-sm" id="nav-admin-btn"
       style="display:none;background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)">
      <i class="fa-solid fa-shield"></i> Admin
    </a>
    <button class="btn btn-primary btn-sm" id="nav-auth-btn" onclick="openAuthModal()">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Ingresar
    </button>
  </div>
</nav>

<!-- Page Header -->
<div style="background:linear-gradient(135deg,var(--navy-dark),var(--navy));padding:2.5rem 1.5rem 2rem">
  <div class="container">
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem">
      <div style="width:40px;height:40px;background:rgba(33,150,243,.2);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center">
        <i class="fa-solid fa-briefcase" style="color:#64b5f6"></i>
      </div>
      <h1 style="font-size:1.6rem;color:white;margin:0">Ofertas laborales</h1>
    </div>
    <p style="color:rgba(255,255,255,.6);font-size:.92rem">Encuentra el trabajo que se adapta a tu perfil</p>
  </div>
</div>

<div class="container section">
  <!-- Filters -->
  <div class="filters-bar">
    <div class="filter-group">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="f-q" placeholder="Buscar por título o empresa..." oninput="debounceBuscar()">
    </div>
    <div class="divider"></div>
    <div class="filter-group" style="max-width:180px">
      <i class="fa-solid fa-tag"></i>
      <select id="f-categoria" onchange="buscar()">
        <option value="">Todas las categorías</option>
        <option value="construccion">Construcción</option>
        <option value="electricidad">Electricidad</option>
        <option value="pintura">Pintura</option>
        <option value="fontaneria">Fontanería</option>
        <option value="tecnologia">Tecnología</option>
        <option value="otros">Otros</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="filter-group" style="max-width:160px">
      <i class="fa-solid fa-map-pin"></i>
      <select id="f-modalidad" onchange="buscar()">
        <option value="">Modalidad</option>
        <option value="presencial">Presencial</option>
        <option value="remoto">Remoto</option>
        <option value="hibrido">Híbrido</option>
      </select>
    </div>
    <div class="divider"></div>
    <label style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--gray-600);cursor:pointer;white-space:nowrap">
      <input type="checkbox" id="f-destacado" onchange="buscar()" style="accent-color:var(--blue)">
      Solo destacadas
    </label>
    <button class="btn btn-ghost btn-sm" onclick="limpiarFiltros()">
      <i class="fa-solid fa-rotate-left"></i> Limpiar
    </button>
  </div>

  <!-- Results header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <p style="font-size:.88rem;color:var(--gray-500)" id="results-info">Cargando...</p>
    <select style="font-size:.83rem;border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:.35rem .75rem;color:var(--gray-600);background:white;outline:none;cursor:pointer" onchange="buscar()">
      <option value="">Más recientes</option>
      <option value="destacado">Destacadas primero</option>
    </select>
  </div>

  <!-- Grid -->
  <div class="grid-3" id="ofertas-grid">
    <div class="loading-overlay" style="grid-column:1/-1">
      <span class="spinner dark"></span><span>Cargando ofertas...</span>
    </div>
  </div>

  <!-- Pagination -->
  <div style="display:flex;justify-content:center;gap:.5rem;margin-top:2rem" id="pagination"></div>
</div>

<footer style="background:var(--navy-dark);padding:1.5rem;text-align:center">
  <p style="color:rgba(255,255,255,.4);font-size:.8rem">© 2025 Workify</p>
</footer>

<script src="/js/core.js"></script>
<script>
let currentPage = 1;
let debounceTimer;

// Leer params de URL al cargar
window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(window.location.search);
  if (p.get('q'))         document.getElementById('f-q').value         = p.get('q');
  if (p.get('categoria')) document.getElementById('f-categoria').value = p.get('categoria');
  buscar();
});

function debounceBuscar() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(buscar, 400);
}

function limpiarFiltros() {
  document.getElementById('f-q').value         = '';
  document.getElementById('f-categoria').value = '';
  document.getElementById('f-modalidad').value = '';
  document.getElementById('f-destacado').checked = false;
  currentPage = 1;
  buscar();
}

async function buscar(page = 1) {
  currentPage = page;
  const q         = document.getElementById('f-q').value;
  const categoria = document.getElementById('f-categoria').value;
  const modalidad = document.getElementById('f-modalidad').value;
  const destacado = document.getElementById('f-destacado').checked;

  const params = new URLSearchParams({ tipo: 'oferta', page, limit: 9 });
  if (q)         params.set('q', q);
  if (categoria) params.set('categoria', categoria);
  if (destacado) params.set('destacado', 'true');

  document.getElementById('ofertas-grid').innerHTML = `
    <div class="loading-overlay" style="grid-column:1/-1">
      <span class="spinner dark"></span><span>Buscando...</span>
    </div>`;

  try {
    const data = await api.get(`/api/publicaciones?${params.toString()}`);
    let pubs = data.publicaciones || [];

    // Filtro modalidad (local, está en detalles JSONB)
    if (modalidad) pubs = pubs.filter(p => p.detalles?.modalidad === modalidad);

    renderOfertas(pubs, data.total, data.totalPages);
  } catch {
    Toast.error('Error al cargar ofertas');
    document.getElementById('ofertas-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fa-solid fa-circle-exclamation"></i>
        <h3>Error al cargar</h3><p>Intenta de nuevo.</p>
      </div>`;
  }
}

function renderOfertas(ofertas, total, totalPages) {
  document.getElementById('results-info').textContent =
    total === 0 ? 'Sin resultados' : `${total} oferta${total !== 1 ? 's' : ''} encontrada${total !== 1 ? 's' : ''}`;

  if (!ofertas.length) {
    document.getElementById('ofertas-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fa-solid fa-briefcase"></i>
        <h3>No se encontraron ofertas</h3>
        <p>Intenta con otros filtros de búsqueda.</p>
        <button class="btn btn-outline btn-sm" onclick="limpiarFiltros()">Limpiar filtros</button>
      </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('ofertas-grid').innerHTML = ofertas.map(renderOfertaCard).join('');
  renderPagination(totalPages);
}

function renderOfertaCard(o) {
  const d = o.detalles || {};
  const dias = diasRestantes(o.fecha_fin);
  return `
    <div class="job-card fade-up" onclick="verDetalleOferta(${o.id})">
      ${o.destacado ? '<span class="badge badge-destacado" style="position:absolute;top:.75rem;right:.75rem"><i class="fa-solid fa-star" style="font-size:.6rem"></i> Destacado</span>' : ''}
      <div style="display:flex;gap:.75rem;margin-bottom:.85rem">
        <div style="width:44px;height:44px;background:rgba(33,150,243,.1);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fa-solid fa-briefcase" style="color:var(--blue)"></i>
        </div>
        <div style="flex:1;min-width:0">
          <h3 style="font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:.15rem;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.titulo}</h3>
          <p style="font-size:.78rem;color:var(--gray-500)">${o.usuarios?.nombre || 'Empresa'}</p>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.85rem">
        ${d.categoria ? `<span class="badge badge-navy">${d.categoria}</span>` : ''}
        ${d.modalidad ? `<span class="badge badge-blue">${d.modalidad}</span>` : ''}
        ${d.tipo_contrato ? `<span class="badge badge-gray">${d.tipo_contrato}</span>` : ''}
      </div>
      ${o.descripcion ? `<p style="font-size:.82rem;color:var(--gray-500);line-height:1.5;margin-bottom:.85rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${o.descripcion}</p>` : ''}
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--gray-400);padding-top:.75rem;border-top:1px solid var(--gray-50)">
        <span><i class="fa-solid fa-location-dot fa-sm" style="margin-right:.25rem"></i>${o.ubicacion || '—'}</span>
        <span style="color:${dias <= 3 ? 'var(--danger)' : 'var(--gray-400)'}">
          <i class="fa-regular fa-clock fa-sm"></i> ${dias > 0 ? `${dias}d` : 'Hoy'}
        </span>
      </div>
    </div>`;
}

function renderPagination(totalPages) {
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline'}"
      onclick="buscar(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = html;
}

async function verDetalleOferta(id) {
  Panel.open({
    title: 'Cargando...',
    subtitle: '',
    body: '<div class="loading-overlay"><span class="spinner dark"></span>Cargando...</div>'
  });
  try {
    const pub = await api.get(`/api/publicaciones/${id}`);
    renderDetalleOferta(pub);
  } catch {
    Panel.setBody('<div class="empty-state"><i class="fa-solid fa-circle-exclamation"></i><h3>Error al cargar</h3></div>');
  }
}

function renderDetalleOferta(o) {
  const d = o.detalles || {};
  const dias = diasRestantes(o.fecha_fin);
  const wsMsg = `Hola, me interesa tu oferta "${o.titulo}". Vi tu publicación en Workify.`;
  const wsNum = d.telefono_contacto || o.usuarios?.whatsapp;

  document.querySelector('.panel-header h2').textContent = o.titulo;
  document.querySelector('.panel-header p').textContent  = o.usuarios?.nombre || 'Empresa';

  const body = `
    <div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.25rem">
      ${o.destacado ? '<span class="badge badge-destacado"><i class="fa-solid fa-star" style="font-size:.6rem"></i> Destacado</span>' : ''}
      ${d.categoria  ? `<span class="badge badge-navy">${d.categoria}</span>` : ''}
      ${d.modalidad  ? `<span class="badge badge-blue">${d.modalidad}</span>` : ''}
      ${d.tipo_contrato ? `<span class="badge badge-gray">${d.tipo_contrato}</span>` : ''}
      <span class="badge ${dias <= 3 ? 'badge-red' : 'badge-gray'}">Vence en ${dias}d</span>
    </div>
    <div class="info-grid" style="margin-bottom:1.25rem">
      <div class="info-item"><div class="info-item-label">Ubicación</div><div class="info-item-value"><i class="fa-solid fa-location-dot" style="color:var(--blue)"></i> ${o.ubicacion || '—'}</div></div>
      <div class="info-item"><div class="info-item-label">Modalidad</div><div class="info-item-value">${d.modalidad || '—'}</div></div>
      <div class="info-item"><div class="info-item-label">Contrato</div><div class="info-item-value">${d.tipo_contrato || '—'}</div></div>
      <div class="info-item"><div class="info-item-label">Publicado</div><div class="info-item-value">${formatFecha(o.fecha_inicio || o.created_at)}</div></div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Descripción</div>
      <div class="detail-value">${o.descripcion || '—'}</div>
    </div>
    ${d.requisitos ? `<div class="detail-section"><div class="detail-label">Requisitos</div><div class="detail-value">${d.requisitos}</div></div>` : ''}
    ${d.email_contacto || d.telefono_contacto ? `
    <div class="detail-section">
      <div class="detail-label">Contacto</div>
      <div class="detail-value">
        ${d.email_contacto    ? `<div style="margin-bottom:.3rem"><i class="fa-solid fa-envelope" style="color:var(--gray-400);margin-right:.4rem;width:14px"></i>${d.email_contacto}</div>` : ''}
        ${d.telefono_contacto ? `<div><i class="fa-solid fa-phone"   style="color:var(--gray-400);margin-right:.4rem;width:14px"></i>${d.telefono_contacto}</div>` : ''}
      </div>
    </div>` : ''}
    <div class="divider-line"></div>
    ${Auth.isLoggedIn() ? `
      ${Auth.user.cv_url ? `
        <div class="highlight-box d-flex align-center gap-2" style="margin-bottom:1rem">
          <i class="fa-solid fa-file-pdf" style="color:var(--blue);font-size:1.2rem"></i>
          <div>
            <div style="font-size:.85rem;font-weight:600">Tu CV está listo</div>
            <a href="${Auth.user.cv_url}" target="_blank" style="font-size:.78rem;color:var(--blue)">Ver mi CV <i class="fa-solid fa-external-link-alt fa-xs"></i></a>
          </div>
        </div>
        <button class="btn btn-primary w-100" onclick="confirmarPostular(${o.id}, '${o.titulo.replace(/'/g,"\\'")}')">
          <i class="fa-solid fa-paper-plane"></i> Enviar postulación
        </button>` : `
        <div class="warning-box d-flex align-center gap-2">
          <i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b;font-size:1.1rem"></i>
          <div>
            <div style="font-size:.85rem;font-weight:600">CV requerido</div>
            <p style="font-size:.78rem;color:var(--gray-600)">Sube tu CV en tu perfil antes de postularte.</p>
            <a href="/pages/perfil.html" class="btn btn-sm btn-outline mt-1">Ir a mi perfil</a>
          </div>
        </div>`}` : `
      <div class="highlight-box text-center">
        <p style="font-size:.88rem;color:var(--gray-600);margin-bottom:.75rem">Inicia sesión para postularte</p>
        <button class="btn btn-primary" onclick="openAuthModal()">Ingresar / Registrarse</button>
      </div>`}`;

  const footer = wsNum ? `
    <a href="${urlWhatsApp(wsNum, wsMsg)}" target="_blank" class="btn btn-whatsapp flex-1">
      <i class="fa-brands fa-whatsapp"></i> Mensaje a la empresa
    </a>` : '';

  Panel.open({ title: o.titulo, subtitle: o.usuarios?.nombre || 'Empresa', body, footer });
}

async function confirmarPostular(ofertaId, titulo) {
  confirmDialog(
    `¿Confirmas tu postulación a "${titulo}"?`,
    async () => {
      try {
        await api.post('/api/postulaciones', { oferta_id: ofertaId });
        Toast.success('¡Postulación enviada exitosamente!');
        Panel.close();
      } catch (err) { Toast.error(err.message); }
    }, '¿Deseas postularte?');
}
</script>
</body>
</html>
